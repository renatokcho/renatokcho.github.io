<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurotrip_2026 | Sinaptica333</title>
    <meta name="description" content="Neurotrip_2026 is a neuroaesthetics experience by Sinaptica333.">
    <link rel="stylesheet" href="lib/fonts/fonts.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <svg class="crt-filter-defs" aria-hidden="true" focusable="false">
        <filter id="crt-noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" stitchTiles="stitch" result="noise">
            </feTurbulence>
            <feColorMatrix in="noise" type="saturate" values="0"></feColorMatrix>
            <feComponentTransfer>
                <feFuncA type="table" tableValues="0 0.12"></feFuncA>
            </feComponentTransfer>
        </filter>
    </svg>

    <div class="page-shell" data-page-shell>
        <div class="ambient ambient-grid" aria-hidden="true"></div>
        <div class="ambient ambient-scan" aria-hidden="true"></div>
        <div class="ambient ambient-vignette" aria-hidden="true"></div>
        <div class="ambient ambient-glow" aria-hidden="true"></div>

        <!-- <div class="topbar"> -->
        <div class="title-dock-bar" aria-hidden="true" data-title-dock-bar>
            <div class="title-dock-copy">
                <span class="title-dock-brand">sinAptica333</span>
                <span class="title-dock-project" data-dock-project-title>Loading...</span>
            </div>
            <button class="lang-toggle" type="button" aria-label="Switch language" data-lang-toggle>
                <span class="lang-option" data-lang-option="en">EN</span>
                <span class="lang-option is-active" data-lang-option="es">ES</span>
            </button>
        </div>
        <!-- </div> -->

        <div class="floating-glyphs" aria-hidden="true">
            <span class="glyph glyph-a">⟁</span>
            <span class="glyph glyph-b">◈</span>
            <span class="glyph glyph-c">▣</span>
            <span class="glyph glyph-d">⊕</span>
            <span class="glyph glyph-e">⟁</span>
            <span class="glyph glyph-f">◌</span>
            <span class="glyph glyph-g">◈</span>
            <span class="glyph glyph-h">⊕</span>
        </div>

        <div class="orb-field" aria-hidden="true">
            <span class="orb orb-cyan"></span>
            <span class="orb orb-lime"></span>
            <span class="orb orb-pink"></span>
            <span class="orb orb-amber"></span>
        </div>

        <main>
            <section class="scene scene-intro" data-scene="intro">

                <div class="scene-inner intro-layout">

                    <div class="brand-mark" data-brand-mark>
                        <div class="brand-name">
                            <!-- the uppercase for A is intentional -->
                            <h1 class="major-mono-display-regular">sinAptica<br /><span class="brand-number">333</span>
                            </h1>
                        </div>
                        <span class="brand-rule"></span>

                        <p class="brand-project glitch-text" data-project-title aria-live="polite"
                            data-text="Neurotrip_2026">
                            <!-- Loading... -->
                        </p>
                        <div class="next-section-btn-container noselect" data-next-section-trigger
                            data-jump-to-section="explanation">
                            <p class="scroll-indicator">A</p>
                        </div>
                    </div>

                    <div class="intro-copy">
                        <!-- <p class="eyebrow" data-i18n data-en="Neuroaesthetics experience"
                            data-es="Experiencia neuroestetica">Neuroaesthetics experience</p> -->
                    </div>

                    <div class="wave-panel" aria-hidden="true">
                        <svg viewBox="0 0 1440 420" class="wave-svg" preserveAspectRatio="none">
                            <path class="wave-path wave-back"
                                d="M0,260 C120,220 240,140 360,160 C480,180 600,310 720,300 C840,290 960,120 1080,120 C1200,120 1320,250 1440,230">
                            </path>
                            <path class="wave-path wave-front"
                                d="M0,300 C180,340 300,120 480,150 C660,180 720,330 900,315 C1080,300 1170,150 1440,180">
                            </path>
                        </svg>
                    </div>
                </div>
            </section>

            <section class="scene scene-explanation" data-scene="explanation">
                <div class="scene-inner story-grid">
                    <div class="story-intro panel">

                        <h2 data-i18n data-en="Sinaptica333 is an artistic and experimental project"
                            data-es="Sinaptica333 es un proyecto artístico y experimental">
                        </h2>
                        <p data-i18n data-en="where we fuse music, technology and sensory stimulation."
                            data-es="donde fusionamos música, tecnología y estimulación sensorial.">
                        </p>
                        <p data-i18n
                            data-en="We don't make traditional entertainment. We craft %span[class='highlighted']neuroaesthetic experiences% by hand. We're an immersive proposal designed to influence certain mental states through the stimulation of neural synapses."
                            data-es="No creamos entretenimiento tradicional. construimos %span[class='highlighted']experiencias neuroestéticas% artesanalmente. Somos una propuesta inmersiva diseñada para influir en estados mentales a través de estimulación externa de la sinapsis neuronal.">
                        </p>
                        <img id="neurotrip-session-img" class="neurotrip-session" src="assets/neurotrip_purple.png">
                        <p data-i18n
                            data-en="%span[class='highlighted']Neurotrip_2026% is a music-guided experience where each participant wears high-fidelity headphones and sits comfortably facing visual stimuli, immersing themselves in various phases of stroboscopic light, binaural audio and ASMR carefully designed to stimulate brainwave entrainment."
                            data-es="%span[class='highlighted']Neurotrip_2026% Consiste en una experiencia guiada musicalmente.">
                        </p>
                    </div>

                    <blockquote class="panel entrainment-quote">
                        <p data-i18n
                            data-en="Each participant wears high-fidelity headphones and sits comfortably facing visual stimuli, immersing themselves in various phases of stroboscopic light, binaural audio and ASMR carefully designed to stimulate %span[class='highlighted']brainwave entrainment%."
                            data-es="Cada participante utiliza audífonos de alta fidelidad y se sitúa cómodamente frente a estímulos visuales, sumergiéndose en diversas fases de luz estroboscópica, audio binaural y ASMR cuidadosamente diseñadas para estimular la sincronización de ondas cerebrales.">
                        </p>
                    </blockquote>

                    <div class="next-section-btn-container noselect" data-next-section-trigger
                        data-jump-to-section="story-detail" data-substract-offset="80">
                        <p class="scroll-indicator">A</p>
                    </div>

                    <div class="panel story-detail" data-scene="story-detail">

                        <p data-i18n
                            data-en="this entrainment of diverse frequencies aims to generate a brain phenomenon known as %span[class='highlighted']neural entrainment% , meaning we intend to create a synchronization of neural activity with external rhythmic stimuli."
                            data-es="Esta sincronización de diversas frecuencias busca generar un fenómeno cerebral que se conoce como %span[class='highlighted']arrastre neuronal%, es decir, pretendemos crear una sincronización de actividad neuronal con estímulos rítmicos externos.">
                        </p>

                        <p data-i18n
                            data-en="If you allow yourself, you'll find yourself in a %span[class='highlighted']deep journey% through which we will explore a range of states: from relaxation, deep meditation, to reaching a zone of internal visual experiences, in which you can perceive fractals and geometric figures with your closed eyes. (similar to %a[target='_blank' href='https://en.wikipedia.org/wiki/Phosphene']phosphenes% but without hurting your pupils.)"
                            data-es="Si te lo permites, te encontrarás en un %span[class='highlighted']viaje profundo% mediante el cual  exploraremos un abanico de estados: desde la relajación, meditación profunda, hasta llegar a una zona de experiencias visuales internas, en el cuál  puedes llegar a percibir fractales y figuras geométricas con tus ojos cerrados. (similar a los %a[target='_blank' href='https://es.wikipedia.org/wiki/Fosfeno']fosfenos% pero sin lastimar tus pupilas.)">
                        </p>
                    </div>

                    <div class="next-section-btn-container noselect" data-next-section-trigger
                        data-jump-to-section="how-does-it-work" data-substract-offset="80">
                        <p class="scroll-indicator">A</p>
                    </div>
                    <div class="panel pillars" data-scene="how-does-it-work">
                        <p class="section-kicker" data-i18n data-en="How it works" data-es="Cómo funciona?"></p>
                        <div class="pillar-list">
                            <article class="pillar">
                                <h3 data-i18n data-en="Rhythmic fluctuations" data-es="Fluctuaciones rítmicas">
                                </h3>
                                <p data-i18n
                                    data-en="The main session %span[class='highlighted']lasts around 33 minutes%, during which sound and light work progressively to guide your mental experience."
                                    data-es="La sesión principal tiene una %span[class='highlighted']duración de 33 minutos%, durante los cuales el sonido y la luz trabajan de manera progresiva para guiar tu experiencia mental.">
                                </p>
                                <p data-i18n
                                    data-en="You'll gradually enter 'the zone' while your %span[class='highlighted']body% is %span[class='highlighted']asleep% but your %span[class='highlighted']mind awake%."
                                    data-es="Entrarás poco a poco en 'la zona' mientras tu %span[class='highlighted']cuerpo% está %span[class='highlighted']dormido% y tu %span[class='highlighted']mente despierta%.">
                                </p>
                            </article>
                            <article class="pillar">
                                <h3 data-i18n data-en="External rhythms" data-es="Ritmos externos"></h3>
                                <p data-i18n
                                    data-en="it is not necessary to do nor consume anything in the session, just be present, allow your body to relax and your mind to wake up."
                                    data-es="No es necesario hacer ni consumir nada en la sesión, solo estar presente, permitir que tu cuerpo se relaje y que tu mente se despierte.">
                                </p>
                                <p data-i18n data-en="Get ready for a %span[class='highlighted']lucid dream%."
                                    data-es="Prepárate para tener un %span[class='highlighted']sueño lúcido%.">
                                </p>
                            </article>
                            <article class="pillar">
                                <h3 data-i18n data-en="Phase-locking" data-es="Sincronizacion de fase">Phase-locking
                                </h3>
                                <p data-i18n
                                    data-en="The session %span[class='highlighted']doesn't end abruptly%, we take additional time for you to return from the trip and stabilize."
                                    data-es="La sesión %span[class='highlighted']no termina de forma abrupta%, tomamos tiempo adicional para que regreses del viaje y te estabilices. ">
                                </p>
                                <p data-i18n
                                    data-en="This moment is important as it allows you to assimilate what you've experienced, gradually return to the everyday state and consciously close the process."
                                    data-es="Este momento es importante, ya que permite asimilar lo experimentado, regresar poco a poco al estado cotidiano y cerrar el proceso de forma consciente.">
                                </p>
                            </article>
                        </div>
                    </div>
                </div>

                        <p data-i18n

                            data-es="Encuéntranos en %a[class='highlighted-wh' href='https://wa.me/%2B5213313838599']Whatsapp% | %a[class='highlighted-ig' href='https://instagram.com/sinaptica333']Instagram% | %a[class='highlighted-fb' href='https://www.facebook.com/profile.php?id=61586156585002']Facebook%">

                        </p> -->

                        <a class="instagram-link" href="https://www.instagram.com/sinaptica333/" target="_blank"
                            rel="noreferrer">@sinaptica333</a>
                    </div>

                    <footer class="footer-band">
                        <span data-i18n data-en="Signal, rhythm, perception."
                            data-es="Señal, ritmo, percepción."></span>

                        <p class="not-recommended-for-photosensitive-people" data-i18n
                            data-en="This experience is not recommended for people with photosensitive epilepsy, neurological issues, history of seizures, any brain injury or tumor."
                            data-es="Esta experiencia no es recomendada para personas con epilepsia fotosensible, problemas neurológicos, antecedentes de convulsiones, alguna lesión o tumor cerebral.">
                        </p>
                    </footer>
                </div>
            </section>
        </main>
    </div>

    <div class="warning-modal is-visible" data-warning-modal role="dialog" aria-modal="true"

            <p class="warning-tag" data-i18n data-en="Photosensitivity warning"
                data-es="Advertencia de fotosensibilidad"></p>

                data-es="Esta experiencia incluye luces estroboscópicas"></h2>
            <p data-i18n data-en="If you are sensitive to flashing visuals, proceed carefully or step away now."
                data-es="Si eres sensible a estímulos visuales intermitentes, continúa con cuidado."></p>
            <button class="warning-dismiss" type="button" data-dismiss-warning>
                <span data-i18n data-en="Continue" data-es="Continuar"></span>
